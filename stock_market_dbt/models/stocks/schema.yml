version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned and staged stock price data"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: price_date
        description: "Date of the price record"
        tests:
          - not_null
      - name: close_price
        description: "Closing price for the day"
        tests:
          - not_null

  - name: mart_stock_performance
    description: "Stock performance analytics by ticker"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
          - unique